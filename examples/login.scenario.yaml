# Example scenario. Run:
#   export DEMO_EMAIL=user@example.com
#   uv run guidebot validate examples/login.scenario.yaml
#   uv run guidebot compile  examples/login.scenario.yaml   # needs Codex CLI
#   uv run guidebot render   examples/login.scenario.yaml --out out/login.mp4
config:
  title: "Logging in to the system"
  baseUrl: https://example.com
  viewport: { width: 1280, height: 720 }
  locale: en-US
  tts: { provider: edge, voice: en-US-GuyNeural, lang: en-US }
  # Optional — the cursor shown during `render`. All fields have defaults;
  # omit the whole block to keep the built-in look and motion.
  # cursor:
  #   width: 34            # px; keep height ≈ width * 4/3 to avoid distortion
  #   height: 46
  #   color: "#ef4444"     # arrow fill
  #   outline: "#ffffff"   # arrow outline
  #   glow: "rgba(239,68,68,.75)"   # halo colour
  #   easing: "cubic-bezier(.45,.05,.25,1)"   # glide curve
  #   speed: 1.15          # px per ms — higher = faster glide
  #   minDuration: 320     # ms floor for very short moves
  #   maxDuration: 1400    # ms ceiling for cross-screen sweeps
  #   settle: 280          # ms pause after arrival, before the click
steps:
  - say: "Welcome. I'll show you how to log in to the system."
  - navigate: /login
  - teach: "To log in, click the Log in button in the top-right corner"
  - enterText: { into: "the email address field", text: "${DEMO_EMAIL}" }
    say: "Now I'm entering my email address."
  - wait: { until: "the loading spinner to disappear", state: hidden, timeout: 10 }
