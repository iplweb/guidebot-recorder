# Onet.pl — how to reach the login.
# Flow: home page → accept the cookie banner → click "Log in" (opens a pop-up).
#
# Run:
#   uv run guidebot validate examples/onet-login.scenario.yaml
#   uv run guidebot compile  examples/onet-login.scenario.yaml   # AI phase (Codex CLI)
#   uv run guidebot render   examples/onet-login.scenario.yaml --out out/onet-login.mp4
#
# Notes:
# - The cookie banner may live in a cross-origin iframe (iframe support is deferred).
# - "Log in" opens a real pop-up window (multi-window support is deferred): the click
#   is recorded, but the pop-up's contents are not yet driven.
config:
  title: "Onet.pl — how to reach the login"
  viewport: { width: 1440, height: 900 }
  locale: pl-PL
  tts: { provider: edge, voice: en-US-GuyNeural, lang: en-US }
steps:
  - say: "I'll show you how to reach the login on the Onet portal. We start on the home page."

  - navigate: "https://www.onet.pl"

  # The consent banner appears after a short delay — wait until it is visible.
  - wait:
      until: "the cookie consent banner to appear"
      state: visible
      timeout: 20

  - teach: "First we accept the cookie consent by clicking the button that continues to the site"

  - teach: "To log in, we click the account icon in the top-right corner of the page"

  - say: "The login window opens in a separate pop-up window, where we enter the email and password."
