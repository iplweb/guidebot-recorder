<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <title>Popup logowania</title>
    <style>
      html, body { min-height: 100%; margin: 0; background: rgb(230, 210, 20); }
      body { color: black; font: 24px sans-serif; padding: 48px; box-sizing: border-box; }
      input, button { display: block; font-size: 22px; margin: 18px 0; padding: 12px; }
    </style>
  </head>
  <body>
    <h1>Logowanie</h1>
    <label for="email">E-mail</label>
    <input id="email" type="email">
    <button onclick="window.opener.postMessage('guidebot-popup-closed', '*'); setTimeout(() => window.close(), 20)">
      Zamknij logowanie
    </button>
  </body>
</html>
